<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mindforge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./dist/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="flex min-h-screen bg-white font-sans">
    <aside class="w-[260px] flex flex-col justify-between shrink-0 px-3 py-6 border-r border-[#E5E7EB]">
        <div class="flex flex-col gap-6">
            <h2 class="text-xl pl-3 font-semibold text-grey-500">
                Mindforge
            </h2>

            <nav class="space-y-4">
                <div>
                    <h3 class=" font-semibold text-grey-500 mb-1 pl-3">
                        Overview
                    </h3>

                    <a href="#" class="flex items-center px-3 py-2 rounded-lg bg-grey-50 text-grey-500 mb-1">
                        <img src="assets/icons/home.png" class="w-5 h-5 mr-3" />
                        <span class="text-base font-medium">Dashboard</span>
                    </a>

                    <a href="#"
                        class="flex items-center px-3 py-2 rounded-lg hover:bg-grey-50 text-grey-400 transition mb-1">
                        <img src="assets/icons/list.png" class="w-5 h-5 mr-3" />
                        <span class="text-base font-medium">My Tasks</span>
                    </a>
                </div>

                <div>
                    <h3 class="font-semibold text-grey-500 mb-1 pl-3">
                        Workspace
                    </h3>

                    <a href="#"
                        class="flex items-center px-3 py-2 rounded-lg hover:bg-grey-50 text-grey-500 transition mb-1">
                        <img src="assets/icons/Folder.png" class="w-5 h-5 mr-3" />
                        <span class="text-base font-medium">Projects</span>
                    </a>

                    <a href="#"
                        class="flex items-center px-3 py-2 rounded-lg hover:bg-grey-50 text-grey-500 transition mb-1">
                        <img src="assets/icons/Pin.png" class="w-5 h-5 mr-3" />
                        <span class="text-base font-medium">Events</span>
                    </a>

                    <a href="#"
                        class="flex items-center px-3 py-2 rounded-lg hover:bg-grey-50 text-grey-500 transition">
                        <img src="assets/icons/Date_today.png" class="w-5 h-5 mr-3" />
                        <span class="text-base font-medium">Calendar</span>
                    </a>
                </div>

                <div>
                    <h3 class=" font-semibold text-grey-500 mb-1 pl-3">
                        Insight
                    </h3>

                    <a href="#"
                        class="flex items-center px-3 py-2 rounded-lg hover:bg-grey-50 text-grey-500 transition">
                        <img src="assets/icons/Frame 4.png" class="w-5 h-5 mr-3" />
                        <span class="text-base font-medium">Analytics</span>
                    </a>
                </div>

            </nav>
        </div>


        <div>
            <a href="#" class="flex items-center px-3 py-2 rounded-lg hover:bg-grey-50 text-grey-500 transition">
                <img src="assets/icons/Setting_line.png" class="w-5 h-5 mr-3" />
                <span class="text-base font-medium">Settings</span>
            </a>
        </div>
    </aside>
    <main class="flex-1 p-8">
        <h1 class="text-2xl font-bold text-grey-500">
            Dashboard
        </h1>
    </main>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <link href="./dist/output.css" rel="stylesheet">

</head>

<body class="flex min-h-screen bg-white font-[Inter]">

    <aside class="w-[260px] bg-white px-4 py-6 flex flex-col justify-between border-r border-gray-200">

                <div>

                    <a href="#" class="flex items-center px-3 py-2 rounded-lg bg-gray-100 mb-1">

                    </a>

                    <a href="#" class="flex items-center px-3 py-2 rounded-lg hover:bg-gray-100 transition mb-1">

                    </a>

                    <a href="#" class="flex items-center px-3 py-2 rounded-lg hover:bg-gray-100 transition mb-1">

                </div>

                <div>

        </div>

        <div>
